# ============================================================================
# ShakeVision · Release Workflow
# ---------------------------------------------------------------------------
# Disparado por:
#   * git tag v*  (p. ej. v0.1.1, v0.2.0)
#   * lanzamiento manual desde la pestaña Actions (workflow_dispatch)
#
# Pasos:
#   1. Job `build-windows`  → ShakeVision-X.Y.Z-windows-x64.zip
#   2. Job `build-macos`    → ShakeVision-X.Y.Z-macos-{x64|arm64}.dmg
#   3. Job `build-linux`    → ShakeVision-X.Y.Z-linux-x64.AppImage
#   4. Job `publish`        → crea (o actualiza) la GitHub Release con
#                             todos los binarios + checksums + CHANGELOG.
#
# Para publicar pre-releases, taggea con sufijo:  v0.2.0-rc1, v0.2.0-beta.
# El workflow detecta el sufijo y marca la release como prerelease.
# ============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag a construir (p. ej. v0.1.1). Si vacío, usa el HEAD actual.'
        required: false
        default: ''

# Permite cancelar builds antiguos del mismo tag si se reempuja
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # necesario para crear / editar Releases

jobs:
  # ============================================================
  # WINDOWS
  # ============================================================
  build-windows:
    name: Build · Windows (x64)
    runs-on: windows-latest
    env:
      # Fuerza UTF-8 en stdout/stderr de Python en Windows. Sin esto,
      # los símbolos Unicode (▶ ✓ ⚠ ✗) revientan con
      # `UnicodeEncodeError: 'charmap'` en cmd.exe / pwsh por defecto
      # (cp1252). `build.py` también hace `reconfigure` por si acaso.
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project + PyInstaller
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install "pyinstaller>=6.5"

      - name: Download web libs (ECharts + textures)
        shell: bash
        run: bash scripts/install_libs.sh

      - name: Build .zip
        shell: pwsh
        run: python packaging/build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: |
            dist/ShakeVision-*-windows-*.zip
            dist/ShakeVision-*-checksums.txt
          if-no-files-found: error
          retention-days: 7

  # ============================================================
  # MACOS — corre en macos-14 (Apple Silicon) por defecto
  # ============================================================
  build-macos:
    name: Build · macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13     # Intel x64
            arch: x64
          - runner: macos-14     # Apple Silicon arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project + PyInstaller + create-dmg
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install "pyinstaller>=6.5"
          brew install create-dmg || true

      - name: Download web libs (ECharts + textures)
        run: bash scripts/install_libs.sh

      - name: Build .dmg
        run: python packaging/build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundle-${{ matrix.arch }}
          path: |
            dist/ShakeVision-*-macos-*.dmg
            dist/ShakeVision-*-checksums.txt
          if-no-files-found: error
          retention-days: 7

  # ============================================================
  # LINUX
  # ============================================================
  build-linux:
    name: Build · Linux (x64)
    runs-on: ubuntu-22.04   # AppImage necesita una libc relativamente vieja
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt / X11 runtime libs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libxkbcommon0 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xkb1 libgl1 libdbus-1-3 libfuse2 libnss3 libxss1 \
            wget file desktop-file-utils

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install "pyinstaller>=6.5"

      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          sudo mv appimagetool-x86_64.AppImage /usr/local/bin/appimagetool

      - name: Download web libs (ECharts + textures)
        run: bash scripts/install_libs.sh

      - name: Build .AppImage
        run: python packaging/build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: |
            dist/ShakeVision-*-linux-*.AppImage
            dist/ShakeVision-*-checksums.txt
          if-no-files-found: error
          retention-days: 7

  # ============================================================
  # PUBLICAR RELEASE
  # ============================================================
  publish:
    name: Publish GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts into release/
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.zip' -o -name '*.dmg' -o -name '*.AppImage' \) \
              -exec cp {} release/ \;
          # Combinar checksums de los 3 jobs en un solo archivo
          find artifacts -name 'ShakeVision-*-checksums.txt' -exec cat {} \; \
              | sort -u > release/SHA256SUMS.txt
          ls -lh release/

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          TAG="${GITHUB_REF##*/}"           # vX.Y.Z
          VERSION="${TAG#v}"                # X.Y.Z
          # Sección [X.Y.Z] hasta el siguiente [ o EOF
          awk -v ver="[$VERSION]" '
            $0 ~ "^## "ver { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release_notes.md
          # Si la sección no existe, dejar un placeholder
          if [ ! -s release_notes.md ]; then
              echo "Release $TAG — ver CHANGELOG.md para detalles." > release_notes.md
          fi
          # Anexar tabla de checksums al final
          {
            echo ""
            echo "---"
            echo ""
            echo "### Checksums (SHA-256)"
            echo ""
            echo '```'
            cat release/SHA256SUMS.txt
            echo '```'
          } >> release_notes.md
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # Detectar pre-release por sufijo (-rc, -beta, -alpha, -dev)
          if echo "$TAG" | grep -qE -- '-(rc|alpha|beta|dev|pre)'; then
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: ShakeVision ${{ steps.notes.outputs.tag }}
          body_path: release_notes.md
          prerelease: ${{ steps.notes.outputs.prerelease }}
          files: |
            release/*.zip
            release/*.dmg
            release/*.AppImage
            release/SHA256SUMS.txt
          fail_on_unmatched_files: true
